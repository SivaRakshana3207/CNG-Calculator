<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="./dist/output.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-r from-violet-500 to-pink-500 min-h-screen">
    <div class="bg-white mx-auto max-w-md my-30 px-10 py-5 rounded shadow-gray-500 shadow-2xs">
        <h1 class="text-red-500 font-bold mt-5">CNG Cost Calculator</h1>
        <form action="" class="my-5">
            <div class="flex flex-col space-y-1 mb-5">
                <label for="trip-distance">Trip Distance <span class="text-red-500 font-semibold">*</span></label>
                <input type="number" id="trip-distance" class="input-field" placeholder="Trip Distance">
            </div>
            <div class="flex flex-col space-y-1 mb-5">
                <label for="trip-distance">Fuel Efficiency <span class="text-red-500 font-semibold">*</span></label>
                <input type="number" id="trip-distance" class="input-field" placeholder="24">
            </div>
            <div class="flex flex-col space-y-1">
                <label for="trip-distance">Fuel Cost <span class="text-red-500 font-semibold">*</span></label>
                <input type="number" id="trip-distance" class="input-field" placeholder="84">
            </div>
        </form>
        <button class="bg-red-500 w-full text-center p-1.5 text-white rounded mb-5">Calculate</button>
    </div>
</body>
</html>
